<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1000" height="200" viewBox="0 0 1000 200">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d1b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00796b;stop-opacity:1" />
    </linearGradient>
    <path id="wave" d="M 0 100 C 250 50 250 150 500 100 C 750 50 750 150 1000 100 L 1000 200 L 0 200 Z" fill="url(#grad)" />
  </defs>
  <rect width="100%" height="100%" fill="#0d1117" />
  <use xlink:href="#wave" y="20">
    <animate attributeName="x" from="0" to="-500" dur="10s" repeatCount="indefinite" />
  </use>
  <use xlink:href="#wave" y="40" opacity="0.5">
    <animate attributeName="x" from="-500" to="0" dur="15s" repeatCount="indefinite" />
  </use>
  <text x="50%" y="45%" dominant-baseline="middle" text-anchor="middle" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="white">YAHYA KHAN</text>
  <text x="50%" y="65%" dominant-baseline="middle" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#e0e0e0">Web &amp; Mobile App Developer</text>
</svg>
